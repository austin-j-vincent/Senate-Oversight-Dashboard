name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly auto-refresh of Congress data (Mondays 08:00 UTC)
    - cron: "0 8 * * 1"

# Allow the GITHUB_TOKEN to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment; let in-progress runs finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Refresh data from the Congress API (key from repo secret; never in the bundle).
      # Resilient: if this fails, the committed JSON is used and the build still succeeds.
      - run: npm run fetch-data
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
      - run: npm run build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
